# Single gate: same commands humans run locally (see README.md → Ship checklist).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify (typecheck + tests)
        run: npm run verify

      - name: Compile (Prisma client + tsc → dist/)
        run: npm run compile
